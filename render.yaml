services:
  - type: static_site
    name: haritnavinya-frontend
    plan: free
    staticPublishPath: frontend/build
    buildCommand: cd frontend && npm install && npm run build
    autoDeployOnPush: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE_URL
        value: https://haritnavinya.onrender.com
